<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake - Edição Retro Neon</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rubik:wght@400;600;800&display=swap");

      :root {
        --neon-blue: #2323ff;
        --neon-blue-light: #6f6fff;
        --neon-yellow: #ffe14d;
        --panel-bg: #0b0b1a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: radial-gradient(
          ellipse at 50% 0%,
          #131327 0%,
          #05050c 60%,
          #000 100%
        );
        color: white;
        font-family: "Rubik", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(
            1px 1px at 10% 20%,
            rgba(255, 255, 255, 0.5),
            transparent
          ),
          radial-gradient(
            1px 1px at 80% 30%,
            rgba(255, 255, 255, 0.4),
            transparent
          ),
          radial-gradient(
            1.5px 1.5px at 60% 70%,
            rgba(255, 255, 255, 0.35),
            transparent
          ),
          radial-gradient(
            1px 1px at 30% 85%,
            rgba(255, 255, 255, 0.4),
            transparent
          ),
          radial-gradient(
            1.5px 1.5px at 90% 80%,
            rgba(255, 255, 255, 0.3),
            transparent
          ),
          radial-gradient(
            1px 1px at 45% 15%,
            rgba(255, 255, 255, 0.4),
            transparent
          );
        background-size: 100% 100%;
        opacity: 0.7;
        pointer-events: none;
        animation: twinkle 4s ease-in-out infinite alternate;
      }

      @keyframes twinkle {
        from {
          opacity: 0.4;
        }
        to {
          opacity: 0.9;
        }
      }

      h1 {
        margin: 0 0 12px 0;
        font-family: "Press Start 2P", monospace;
        font-size: 26px;
        letter-spacing: 2px;
        color: var(--neon-blue-light);
        text-shadow:
          0 0 6px rgba(111, 111, 255, 0.9),
          0 0 18px rgba(111, 111, 255, 0.6),
          0 0 36px rgba(35, 35, 255, 0.4);
        text-align: center;
      }

      #hud {
        display: flex;
        gap: 22px;
        align-items: center;
        margin-bottom: 14px;
        font-family: "Press Start 2P", monospace;
        font-size: 13px;
      }

      #score,
      #high-score-panel {
        background: linear-gradient(180deg, #17173a, #0a0a1c);
        border: 2px solid var(--neon-blue-light);
        border-radius: 10px;
        padding: 8px 16px;
        box-shadow:
          0 0 10px rgba(70, 70, 255, 0.55),
          inset 0 0 12px rgba(70, 70, 255, 0.25);
        color: #4de1ff;
        text-shadow: 0 0 6px rgba(77, 225, 255, 0.7);
      }

      #board-wrap {
        position: relative;
        border-radius: 16px;
        padding: 10px;
        background: linear-gradient(160deg, #0d0d22, #030308);
        box-shadow:
          0 0 0 2px rgba(80, 80, 255, 0.4),
          0 0 40px rgba(35, 35, 255, 0.45),
          0 20px 60px rgba(0, 0, 0, 0.7);
      }

      canvas {
        display: block;
        border-radius: 8px;
        background-color: #000;
      }

      #overlay {
        position: absolute;
        inset: 10px;
        background: rgba(0, 0, 0, 0.9);
        border-radius: 8px;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        font-family: "Press Start 2P", monospace;
        text-align: center;
      }

      #overlay-title {
        font-size: 32px;
        margin-bottom: 20px;
        letter-spacing: 2px;
        color: #ff2d2d;
        text-shadow: 0 0 15px rgba(255, 45, 45, 0.8);
      }

      #overlay-score {
        font-family: Arial, sans-serif;
        font-size: 20px;
        color: #ffe14d;
        margin-bottom: 40px;
      }

      .reset-btn {
        background: linear-gradient(180deg, #ffe14d, #ffb400);
        color: #000;
        border: none;
        padding: 14px 28px;
        font-family: "Press Start 2P", monospace;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(255, 225, 77, 0.6);
        transition:
          transform 0.1s,
          box-shadow 0.2s;
      }

      .reset-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(255, 225, 77, 0.9);
      }

      footer {
        margin-top: 14px;
        font-size: 12px;
        color: #8888aa;
        letter-spacing: 0.5px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>★ SNAKE ★</h1>
    <div id="hud">
      <div id="score">PONTOS: 0</div>
      <div id="high-score-panel">RECORDE: 0</div>
    </div>
    <div id="board-wrap">
      <canvas id="canvas" width="640" height="640"></canvas>

      <div id="overlay">
        <div id="overlay-title">FIM DE JOGO</div>
        <div id="overlay-score">Pontuação final: 0</div>
        <button class="reset-btn" onclick="resetGame()">JOGAR DE NOVO</button>
      </div>
    </div>
    <footer>Use as setas do teclado ou as teclas WASD para se mover</footer>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const scoreElement = document.getElementById("score");
      const recordElement = document.getElementById("high-score-panel");
      const overlay = document.getElementById("overlay");
      const overlayScore = document.getElementById("overlay-score");

      const GRID_SIZE = 20;
      const TILE_SIZE = 32;

      let score = 0;
      let record = 0;
      let gameOver = false;
      let frameCount = 0;

      let snake = [];
      let dx = 1;
      let dy = 0;
      let nextDx = 1;
      let nextDy = 0;

      let food = { x: 0, y: 0 };

      // Controle de tempo de frames
      let lastTime = 0;
      const stepInterval = 110; // Velocidade da cobrinha (ms por passo)

      function resetGame() {
        score = 0;
        gameOver = false;
        dx = 1;
        dy = 0;
        nextDx = 1;
        nextDy = 0;
        scoreElement.innerText = "PONTOS: 0";
        overlay.style.display = "none";

        // Inicializa a cobra tradicional (3 segmentos)
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 },
        ];

        spawnFood();
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
      }

      function spawnFood() {
        while (true) {
          const fx = Math.floor(Math.random() * GRID_SIZE);
          const fy = Math.floor(Math.random() * GRID_SIZE);

          let collision = false;
          for (let part of snake) {
            if (part.x === fx && part.y === fy) {
              collision = true;
              break;
            }
          }
          if (!collision) {
            food = { x: fx, y: fy };
            break;
          }
        }
      }

      window.addEventListener("keydown", (e) => {
        if (gameOver) return;
        switch (e.key) {
          case "ArrowUp":
          case "w":
          case "W":
            if (dy !== 1) {
              nextDx = 0;
              nextDy = -1;
            }
            break;
          case "ArrowDown":
          case "s":
          case "S":
            if (dy !== -1) {
              nextDx = 0;
              nextDy = 1;
            }
            break;
          case "ArrowLeft":
          case "a":
          case "A":
            if (dx !== 1) {
              nextDx = -1;
              nextDy = 0;
            }
            break;
          case "ArrowRight":
          case "d":
          case "D":
            if (dx !== -1) {
              nextDx = 1;
              nextDy = 0;
            }
            break;
        }
      });

      function update() {
        if (gameOver) return;
        frameCount++;

        dx = nextDx;
        dy = nextDy;

        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // Colisão com as bordas
        if (
          head.x < 0 ||
          head.x >= GRID_SIZE ||
          head.y < 0 ||
          head.y >= GRID_SIZE
        ) {
          endGame();
          return;
        }

        // Colisão com o corpo
        for (let part of snake) {
          if (part.x === head.x && part.y === head.y) {
            endGame();
            return;
          }
        }

        snake.unshift(head);

        // Se comeu a maçã
        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreElement.innerText = "PONTOS: " + score;
          if (score > record) {
            record = score;
            recordElement.innerText = "RECORDE: " + record;
          }
          spawnFood();
        } else {
          snake.pop();
        }
      }

      function endGame() {
        gameOver = true;
        overlayScore.innerText = "Pontuação final: " + score;
        overlay.style.display = "flex";
      }

      function drawGrid() {
        ctx.strokeStyle = "rgba(35, 35, 255, 0.12)";
        ctx.lineWidth = 1;
        for (let i = 0; i <= GRID_SIZE; i++) {
          ctx.beginPath();
          ctx.moveTo(i * TILE_SIZE, 0);
          ctx.lineTo(i * TILE_SIZE, canvas.height);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(0, i * TILE_SIZE);
          ctx.lineTo(canvas.width, i * TILE_SIZE);
          ctx.stroke();
        }
      }

      // Função auxiliar para desenhar círculos arredondados perfeitos
      function drawRoundedRect(
        x,
        y,
        size,
        radius,
        fillStyle,
        shadowColor,
        shadowBlur,
      ) {
        ctx.save();
        if (shadowColor) {
          ctx.shadowColor = shadowColor;
          ctx.shadowBlur = shadowBlur;
        }
        ctx.fillStyle = fillStyle;
        ctx.beginPath();
        ctx.arc(x + size / 2, y + size / 2, size / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fundo escuro azulado espacial
        ctx.fillStyle = "#04040c";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawGrid();

        // 1. Desenha a comida (Maçã Digital Neon Vermelha)
        const fx = food.x * TILE_SIZE;
        const fy = food.y * TILE_SIZE;
        const pulse = Math.sin(frameCount * 0.2) * 2; // Efeito pulsar

        // Brilho da maçã
        ctx.save();
        ctx.shadowColor = "rgba(255, 45, 45, 0.85)";
        ctx.shadowBlur = 10 + pulse;
        ctx.fillStyle = "#ff2d2d";
        ctx.beginPath();
        // Desenha uma esfera neon vermelha perfeita
        ctx.arc(
          fx + TILE_SIZE / 2,
          fy + TILE_SIZE / 2,
          TILE_SIZE / 2 - 4 + pulse * 0.5,
          0,
          Math.PI * 2,
        );
        ctx.fill();

        // Detalhe da folhinha verde no topo da maçã
        ctx.fillStyle = "#4dffa6";
        ctx.beginPath();
        ctx.ellipse(
          fx + TILE_SIZE / 2 + 2,
          fy + 6,
          2,
          4,
          Math.PI / 4,
          0,
          Math.PI * 2,
        );
        ctx.fill();
        ctx.restore();

        // 2. Desenha a Cobrinha Neon Tradicional
        snake.forEach((part, index) => {
          const px = part.x * TILE_SIZE;
          const py = part.y * TILE_SIZE;

          if (index === 0) {
            // CABEÇA (Verde-Limão Neon super brilhante)
            const headGrad = ctx.createRadialGradient(
              px + TILE_SIZE / 2,
              py + TILE_SIZE / 2,
              1,
              px + TILE_SIZE / 2,
              py + TILE_SIZE / 2,
              TILE_SIZE / 2,
            );
            headGrad.addColorStop(0, "#ffffff");
            headGrad.addColorStop(0.4, "#4dffa6");
            headGrad.addColorStop(1, "#00994d");

            drawRoundedRect(
              px,
              py,
              TILE_SIZE,
              6,
              headGrad,
              "rgba(77, 255, 166, 0.9)",
              14,
            );

            // Olhos simples de cobra digital brilhante
            ctx.fillStyle = "white";
            ctx.beginPath();
            if (dx !== 0) {
              // Olhos orientados ao mover na horizontal
              ctx.arc(
                px + TILE_SIZE / 2 + dx * 4,
                py + TILE_SIZE / 2 - 5,
                2,
                0,
                Math.PI * 2,
              );
              ctx.arc(
                px + TILE_SIZE / 2 + dx * 4,
                py + TILE_SIZE / 2 + 5,
                2,
                0,
                Math.PI * 2,
              );
            } else {
              // Olhos orientados ao mover na vertical
              ctx.arc(
                px + TILE_SIZE / 2 - 5,
                py + TILE_SIZE / 2 + dy * 4,
                2,
                0,
                Math.PI * 2,
              );
              ctx.arc(
                px + TILE_SIZE / 2 + 5,
                py + TILE_SIZE / 2 + dy * 4,
                2,
                0,
                Math.PI * 2,
              );
            }
            ctx.fill();
          } else {
            // CORPO (Transição degradê suave de Verde Esmeralda para Azul Ciano)
            const ratio = index / snake.length;
            const bodyGrad = ctx.createLinearGradient(
              px,
              py,
              px + TILE_SIZE,
              py + TILE_SIZE,
            );

            // Mistura as cores neon baseando-se na proximidade da cauda
            bodyGrad.addColorStop(0, "#00b377");
            bodyGrad.addColorStop(1, "#006a8a");

            // Efeito de afinamento suave do corpo até a ponta da cauda
            const sizeReduction = TILE_SIZE * (1 - ratio * 0.3);
            const offset = (TILE_SIZE - sizeReduction) / 2;

            ctx.save();
            ctx.shadowColor = "rgba(0, 179, 119, 0.4)";
            ctx.shadowBlur = 6;
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(
              px + offset + sizeReduction / 2,
              py + offset + sizeReduction / 2,
              sizeReduction / 2 - 2,
              0,
              Math.PI * 2,
            );
            ctx.fill();
            ctx.restore();
          }
        });
      }

      function gameLoop(currentTime) {
        if (gameOver) return;

        requestAnimationFrame(gameLoop);

        const delta = currentTime - lastTime;
        if (delta >= stepInterval) {
          update();
          draw();
          lastTime = currentTime - (delta % stepInterval);
        } else {
          draw();
        }
      }

      resetGame();
    </script>
  </body>
</html>
